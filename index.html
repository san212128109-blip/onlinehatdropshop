<!-- কেটে যাওয়া অংশটি পূরণ করা হলো এবং কনটেইনার ক্লোজ করা হলো -->
                <h3 class="font-bold text-rose-400 mb-3">📋 অ্যাডমিন কন্ট্রোল ও পেন্ডিং অ্যাপ্লিকেশন</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase mb-2">পেন্ডিং ভেন্ডর সাইন-আপ</h4>
                        <div id="admPendingVendors" class="space-y-2 max-h-60 overflow-y-auto"></div>
                    </div>
                    <div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase mb-2">সিস্টেম অর্ডার লগ (সব অর্ডার)</h4>
                        <div id="admOrdersLog" class="space-y-2 max-h-60 overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </section>

    </div> <!-- mainContentContainer শেষ -->

    <!-- ========================================== -->
    <!--          প্ল্যাটফর্ম জাভাস্ক্রিপ্ট ইঞ্জিন        -->
    <!-- ========================================== -->
    <script>
        // --- ১. লোকাল ডাটাবেজ স্টেট (Local Storage) ---
        const DEFAULT_PRODUCTS = [
            { id: 1, name: "Premium Drop Shoulder T-Shirt", price: 450, stock: 120, shop: "Main Warehouse", img: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=400", views: 412 },
            { id: 2, name: "Solid Oxford Formal Shirt", price: 850, stock: 85, shop: "Main Warehouse", img: "https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=400", views: 230 },
            { id: 3, name: "Classic Boot Cut Denim Pant", price: 1250, stock: 40, shop: "Main Warehouse", img: "https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=400", views: 521 },
            { id: 4, name: "Premium Gurkha Tailored Trousers", price: 1400, stock: 35, shop: "Main Warehouse", img: "https://images.unsplash.com/photo-1624378439575-d8705ad7ae80?w=400", views: 189 }
        ];

        let db = {
            products: JSON.parse(localStorage.getItem('dh_products')) || DEFAULT_PRODUCTS,
            users: JSON.parse(localStorage.getItem('dh_users')) || [],
            orders: JSON.parse(localStorage.getItem('dh_orders')) || [],
            currentSession: JSON.parse(localStorage.getItem('dh_session')) || null,
            systemViews: parseInt(localStorage.getItem('dh_views')) || 1354
        };

        function saveDB() {
            localStorage.setItem('dh_products', JSON.stringify(db.products));
            localStorage.setItem('dh_users', JSON.stringify(db.users));
            localStorage.setItem('dh_orders', JSON.stringify(db.orders));
            localStorage.setItem('dh_session', JSON.stringify(db.currentSession));
            localStorage.setItem('dh_views', db.systemViews.toString());
        }

        // --- ২. পেজ নেভিগেশন ও রাউটিং ---
        function showSection(sectionId) {
            const sections = ['homepage', 'loginPage', 'customerDashboard', 'adminPanel'];
            sections.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('hidden-section');
            });
            
            document.getElementById(sectionId).classList.remove('hidden-section');
            window.scrollTo(0,0);
            
            if(sectionId === 'homepage') {
                db.systemViews += 1;
                saveDB();
                renderCatalog();
            }
            renderNavigationUI();
        }

        function renderNavigationUI() {
            const navLoginBtn = document.getElementById('navLoginBtn');
            const navCustomerBtn = document.getElementById('navCustomerBtn');
            const navAdminBtn = document.getElementById('navAdminBtn');
            const navLogoutBtn = document.getElementById('navLogoutBtn');

            if (db.currentSession) {
                navLoginBtn.classList.add('hidden');
                navLogoutBtn.classList.remove('hidden');
                
                if (db.currentSession.role === 'admin') {
                    navAdminBtn.classList.remove('hidden');
                    navCustomerBtn.classList.add('hidden');
                } else {
                    navCustomerBtn.classList.remove('hidden');
                    navAdminBtn.classList.add('hidden');
                }
            } else {
                navLoginBtn.classList.remove('hidden');
                navCustomerBtn.classList.add('hidden');
                navAdminBtn.classList.add('hidden');
                navLogoutBtn.classList.add('hidden');
            }
        }

        // --- ৩. ইউজার সাইন-আপ এবং লগইন সিস্টেম ---
        function handleSignUp(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value.trim();
            
            if(db.users.some(u => u.email === email) || email === "admin@platform.com") {
                alert("এই ইমেইলটি অলরেডি সিস্টেমে রেজিস্টার্ড আছে!");
                return;
            }

            const newUser = {
                id: Date.now(),
                name: document.getElementById('regFullName').value,
                shopBrand: document.getElementById('regShopBrandName').value,
                phone: document.getElementById('regPhone').value,
                email: email,
                address: document.getElementById('regAddress').value,
                password: document.getElementById('regPassword').value,
                status: 'pending', // অ্যাডমিন অ্যাপ্রুভালের জন্য অপেক্ষা
                walletBalance: 0,
                salesCount: 0,
                hasActiveShop: false,
                notifications: ["আপনার অ্যাকাউন্ট অ্যাপ্লিকেশন জমা হয়েছে। অ্যাডমিন অ্যাপ্রুভালের জন্য অপেক্ষা করুন।"]
            };

            db.users.push(newUser);
            saveDB();
            alert("আপনার আবেদনটি জমা হয়েছে! অ্যাডমিন প্যানেল থেকে অ্যাপ্রুভ করার পর লগইন করতে পারবেন।");
            e.target.reset();
            showSection('homepage');
            refreshAdminConsole();
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;

            // অ্যাডমিন লগইন (ডাইরেক্ট ব্যাকডোর)
            if (email === "admin@platform.com" && pass === "admin1234") {
                db.currentSession = { name: "সিস্টেম অ্যাডমিন", email: email, role: "admin" };
                saveDB();
                refreshAdminConsole();
                showSection('adminPanel');
                return;
            }

            const user = db.users.find(u => u.email === email && u.password === pass);
            if (!user) {
                alert("ভুল ইমেইল বা পাসওয়ার্ড দিয়েছেন। আবার চেষ্টা করুন।");
                return;
            }

            if (user.status === 'pending') {
                alert("আপনার অ্যাকাউন্টটি এখনো অ্যাডমিন দ্বারা অ্যাপ্রুভ করা হয়নি।");
                return;
            }

            db.currentSession = { ...user, role: "vendor" };
            saveDB();
            loadCustomerDashboard();
            showSection('customerDashboard');
        }

        function logout() {
            db.currentSession = null;
            saveDB();
            showSection('homepage');
        }

        // --- ৪. প্রোডাক্ট ক্যাটালগ ও শপ ডিসপ্লে ---
        function renderCatalog() {
            const productsGrid = document.getElementById('productsGrid');
            const featuredShopsContainer = document.getElementById('featuredShopsContainer');
            
            productsGrid.innerHTML = '';
            featuredShopsContainer.innerHTML = '';

            // মেইন মার্কেটপ্লেস প্রোডাক্ট রেন্ডারিং
            db.products.forEach(p => {
                productsGrid.innerHTML += `
                    <div class="bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-md transition flex flex-col justify-between">
                        <img src="${p.img}" class="w-full h-48 object-cover bg-gray-50">
                        <div class="p-4 space-y-2 flex-1 flex flex-col justify-between">
                            <div>
                                <span class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded font-bold uppercase">${p.shop}</span>
                                <h4 class="font-bold text-gray-800 text-sm mt-1 line-clamp-2">${p.name}</h4>
                            </div>
                            <div class="pt-2 flex justify-between items-center border-t border-gray-50">
                                <div>
                                    <p class="text-[10px] text-gray-400">রিসেলার প্রাইস</p>
                                    <p class="text-base font-black text-indigo-600">৳${p.price}</p>
                                </div>
                                <button onclick="openOrderModal(${p.id})" class="bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold text-xs px-3 py-2 rounded-lg transition">অর্ডার করুন</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            // লাইভ শপগুলোর তালিকা
            const activeShops = db.users.filter(u => u.hasActiveShop);
            if(activeShops.length === 0) {
                featuredShopsContainer.innerHTML = `<p class="text-xs text-gray-400 col-span-full">বর্তমানে কোনো ভেরিফাইড শপ লাইভ নেই।</p>`;
            } else {
                activeShops.forEach(s => {
                    featuredShopsContainer.innerHTML += `
                        <div class="bg-white border rounded-xl p-3 flex items-center gap-2 shadow-sm">
                            <div class="w-8 h-8 bg-amber-100 rounded-full flex items-center justify-center text-xs">🏪</div>
                            <div>
                                <h4 class="text-xs font-bold text-gray-800">${s.shopBrand}</h4>
                                <p class="text-[9px] text-emerald-600 font-medium">ভেরিফাইড পার্টনার</p>
                            </div>
                        </div>
                    `;
                });
            }
        }

        // --- ৫. কাস্টমার অর্ডার এবং বিলিং ক্যালকুলেশন ---
        let selectedProductForOrder = null;

        window.openOrderModal = function(productId) {
            selectedProductForOrder = db.products.find(p => p.id === productId);
            if(!selectedProductForOrder) return;

            document.getElementById('modalProductImg').src = selectedProductForOrder.img;
            document.getElementById('modalProductName').innerText = selectedProductForOrder.name;
            document.getElementById('modalProductShop').innerText = selectedProductForOrder.shop;
            document.getElementById('modalProductPrice').innerText = selectedProductForOrder.price;
            document.getElementById('orderQuantity').value = 1;

            document.getElementById('orderModal').classList.remove('hidden');
            calculateTotalBill();
        }

        window.closeOrderModal = function() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        window.calculateTotalBill = function() {
            if(!selectedProductForOrder) return;
            const qty = parseInt(document.getElementById('orderQuantity').value) || 1;
            const delivery = parseInt(document.getElementById('deliveryArea').value) || 70;
            const bill = (selectedProductForOrder.price * qty) + delivery;
            document.getElementById('totalBill').innerText = bill;
        }

        window.submitOrder = function(e) {
            e.preventDefault();
            if(!selectedProductForOrder) return;

            const qty = parseInt(document.getElementById('orderQuantity').value) || 1;
            if(qty > selectedProductForOrder.stock) {
                alert("দুঃখিত, স্টক পর্যাপ্ত নয়!");
                return;
            }

            const deliveryCharge = parseInt(document.getElementById('deliveryArea').value);
            const finalBill = (selectedProductForOrder.price * qty) + deliveryCharge;

            const newOrder = {
                id: "ORD" + (1000 + db.orders.length + 1),
                productId: selectedProductForOrder.id,
                productName: selectedProductForOrder.name,
                originShop: selectedProductForOrder.shop,
                quantity: qty,
                customerName: document.getElementById('custName').value,
                customerPhone: document.getElementById('custPhone').value,
                customerAddress: document.getElementById('custAddress').value,
                color: document.getElementById('orderColor').value,
                totalBill: finalBill,
                status: 'প্রসেসিং (ডেলিভারি পেন্ডিং)'
            };

            // স্টক কমানো
            selectedProductForOrder.stock -= qty;
            db.orders.push(newOrder);
            
            // ভেন্ডরের কমিশন ও সেলস ট্র্যাকিং আপডেট (রিসেলিং প্রফিট মার্জিন)
            const matchVendor = db.users.find(u => u.shopBrand === selectedProductForOrder.shop);
            if(matchVendor) {
                matchVendor.salesCount += qty;
                matchVendor.walletBalance += (selectedProductForOrder.price * 0.10) * qty; // ১০% ডেমো কমিশন যোগ
                matchVendor.notifications.unshift(`নতুন অর্ডার এসেছে: ${selectedProductForOrder.name}! ওয়ালেটে প্রফিট যোগ হয়েছে।`);
            }

            saveDB();
            alert(`🎉 অর্ডার সফল হয়েছে! আপনার অর্ডার আইডি: ${newOrder.id}`);
            closeOrderModal();
            e.target.reset();
            renderCatalog();
        }

        // --- ৬. রিসেলার/ভেন্ডর ড্যাশবোর্ড ম্যানেজমেন্ট ---
        function loadCustomerDashboard() {
            if(!db.currentSession) return;
            const user = db.users.find(u => u.email === db.currentSession.email);
            if(!user) return;

            document.getElementById('dashCustomerName').innerText = user.name;
            document.getElementById('dashCustomerEmail').innerText = `শপ ব্র্যান্ড: ${user.shopBrand || 'নাই'} | ফোন: ${user.phone}`;
            document.getElementById('dashWalletBalance').innerText = user.walletBalance.toFixed(2);
            document.getElementById('vendorSalesCount').innerText = user.salesCount;

            // মোট ইনভেন্টরি ভ্যালু হিসাব
            const totalValuation = db.products
                .filter(p => p.shop === user.shopBrand)
                .reduce((acc, current) => acc + (current.price * current.stock), 0);
            document.getElementById('vendorStockValue').innerText = totalValuation;

            // নোটিফিকেশন রেন্ডার
            const notifyBox = document.getElementById('customerNotifications');
            notifyBox.innerHTML = user.notifications.map(n => `<div class="p-1.5 border-b bg-gray-50 rounded text-xs text-gray-700">${n}</div>`).join('');

            // ভার্চুয়াল শপ অ্যাক্টিভেশন এরিয়া চেক
            const shopSetupBox = document.getElementById('shopSetupBox');
            const vendorAddProductArea = document.getElementById('vendorAddProductArea');

            if(!user.hasActiveShop) {
                shopSetupBox.innerHTML = `
                    <p class="text-xs text-gray-500 mb-3">আপনার ড্রপশিপিং শপটি এখনও অনলাইনে লাইভ করা হয়নি।</p>
                    <button onclick="activateStorefrontNode(${user.id})" class="w-full bg-indigo-600 text-white font-bold py-2 rounded text-xs hover:bg-indigo-700 transition">লাইভ শপ অ্যাক্টিভেট করুন</button>
                `;
                vendorAddProductArea.classList.add('hidden');
            } else {
                shopSetupBox.innerHTML = `
                    <div class="bg-emerald-50 text-emerald-800 p-3 rounded-lg border border-emerald-200 text-xs">
                        <p class="font-bold">✅ শপ অনলাইন ও লাইভ আছে</p>
                        <p class="mt-1 text-[11px]">ব্র্যান্ড নাম: <strong>${user.shopBrand}</strong></p>
                    </div>
                `;
                vendorAddProductArea.classList.remove('hidden');
            }
        }

        window.activateStorefrontNode = function(userId) {
            const user = db.users.find(u => u.id === userId);
            if(!user) return;
            user.hasActiveShop = true;
            user.notifications.unshift("🚀 আপনার ভার্চুয়াল স্টোরফ্রন্ট সফলভাবে প্ল্যাটফর্মে লাইভ করা হয়েছে।");
            saveDB();
            loadCustomerDashboard();
            renderCatalog();
        }

        window.vendorAddProduct = function(e) {
            e.preventDefault();
            const user = db.users.find(u => u.email === db.currentSession.email);
            if(!user) return;

            const newProduct = {
                id: Date.now(),
                name: document.getElementById('vProdName').value,
                price: parseInt(document.getElementById('vProdPrice').value),
                stock: parseInt(document.getElementById('vProdStock').value),
                shop: user.shopBrand,
                img: "https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=400", // ডিফল্ট ছবি
                views: 0
            };

            db.products.push(newProduct);
            user.notifications.unshift(`নতুন প্রোডাক্ট যুক্ত হয়েছে: [${newProduct.name}]`);
            saveDB();
            alert("আপনার প্রোডাক্টটি সফলভাবে ইনডেক্স করা হয়েছে!");
            e.target.reset();
            loadCustomerDashboard();
            renderCatalog();
        }

        // --- ৭. অ্যাডমিন প্যানেল কন্ট্রোল ---
        function refreshAdminConsole() {
            document.getElementById('admTotalUsers').innerText = `${db.users.length} জন`;
            document.getElementById('admTotalOrders').innerText = `${db.orders.length} টি`;
            document.getElementById('admTotalViewed').innerText = `${db.systemViews} বার`;
            
            const dynamicShopsCount = db.users.filter(u => u.hasActiveShop).length;
            document.getElementById('admTotalShops').innerText = `${dynamicShopsCount} টি`;

            // পেন্ডিং ভেন্ডর রিকোয়েস্ট লিস্ট
            const pendingContainer = document.getElementById('admPendingVendors');
            const pendingList = db.users.filter(u => u.status === 'pending');
            pendingContainer.innerHTML = '';

            if(pendingList.length === 0) {
                pendingContainer.innerHTML = `<p class="text-[11px] text-slate-400 font-mono">কোনো পেন্ডিং রিকোয়েস্ট নেই।</p>`;
            } else {
                pendingList.forEach(u => {
                    pendingContainer.innerHTML += `
                        <div class="bg-slate-950 p-2 border border-slate-800 rounded flex justify-between items-center text-[11px]">
                            <div>
                                <p class="text-indigo-400 font-bold">${u.name} (${u.shopBrand})</p>
                                <p class="text-[10px] text-slate-400">${u.email}</p>
                            </div>
                            <button onclick="approveVendorNode(${u.id})" class="bg-emerald-600 hover:bg-emerald-500 text-white px-2 py-1 rounded text-[10px]">অ্যাপ্রুভ করুন</button>
                        </div>
                    `;
                });
            }

            // সিস্টেম অর্ডার লগ
            const logBox = document.getElementById('admOrdersLog');
            logBox.innerHTML = '';
            if(db.orders.length === 0) {
                logBox.innerHTML = `<p class="text-[11px] text-slate-400 font-mono">সিস্টেমে কোনো অর্ডার ডাটা নেই।</p>`;
            } else {
                db.orders.forEach(o => {
                    logBox.innerHTML += `
                        <div class="bg-slate-950 p-2 border border-slate-800 rounded text-[10px] space-y-1">
                            <div class="flex justify-between font-mono text-amber-400">
                                <span>অর্ডার আইডি: ${o.id}</span>
                                <span class="text-emerald-400">৳${o.totalBill}</span>
                            </div>
                            <p class="text-slate-300">প্রোডাক্ট: ${o.productName} (x${o.quantity})</p>
                            <p class="text-slate-400">গ্রাহক: ${o.customerName} (${o.customerPhone})</p>
                        </div>
                    `;
                });
            }
        }

        window.approveVendorNode = function(userId) {
            const user = db.users.find(u => u.id === userId);
            if(!user) return;
            user.status = 'approved';
            user.notifications.unshift("🎉 অভিনন্দন! আপনার ভেন্ডর অ্যাকাউন্টটি অ্যাডমিন দ্বারা অ্যাপ্রুভ করা হয়েছে।");
            saveDB();
            refreshAdminConsole();
            alert(`সফলভাবে অ্যাকাউন্ট অ্যাপ্রুভ করা হয়েছে: ${user.name}`);
        }

        // --- ৮. Smart AI Command Console (ন্যাচারাল ল্যাঙ্গুয়েজ প্রসেসর) ---
        window.processAICommand = function(e) {
            e.preventDefault();
            const inputField = document.getElementById('aiInputField');
            const responseBox = document.getElementById('aiResponseBox');
            const command = inputField.value.trim().toLowerCase();
            
            if(!command) return;
            responseBox.classList.remove('hidden');
            
            // AI কম্যান্ড ডিটেকশন (বাংলা এবং ইংরেজি দুইটাই বুঝবে)
            if (command.includes("add") || command.includes("তৈরি") || command.includes("যোগ")) {
                const numericalDigits = command.match(/\d+/g);
                const computedTargetPrice = numericalDigits ? parseInt(numericalDigits[0]) : 500;
                
                const aiGeneratedProduct = {
                    id: Date.now(),
                    name: "AI Premium Apparel " + (command.includes("watch") || command.includes("ঘড়ি") ? "Smart Watch Edition" : "Sneakers Pro"),
                    price: computedTargetPrice,
                    stock: 60,
                    shop: "Main Warehouse",
                    img: "https://images.unsplash.com/photo-1542272604-787c3835535d?w=400",
                    views: 5
                };
                
                db.products.push(aiGeneratedProduct);
                saveDB();
                renderCatalog();
                refreshAdminConsole();
                responseBox.innerText = `[AI সফল]: একটি নতুন প্রোডাক্ট অটো-জেনারেট করে সিস্টেমে যুক্ত করা হয়েছে! [নাম: ${aiGeneratedProduct.name} | মূল্য: ৳${computedTargetPrice}]`;
            } 
            else if (command.includes("cancel") || command.includes("order") || command.includes("বাতিল")) {
                const numericalDigits = command.match(/\d+/g);
                if(!numericalDigits) {
                    responseBox.innerText = "[AI ভুল]: কম্যান্ডে কোনো অর্ডার আইডি বা নাম্বার খুঁজে পাওয়া যায়নি।";
                    return;
                }
                const extractionTargetId = "ORD" + numericalDigits[0];
                const indexMatch = db.orders.findIndex(o => o.id === extractionTargetId || o.id.includes(numericalDigits[0]));
                
                if (indexMatch !== -1) {
                    db.orders.splice(indexMatch, 1);
                    saveDB();
                    refreshAdminConsole();
                    responseBox.innerText = `[AI সফল]: অর্ডার আইডি ORD${numericalDigits[0]} সফলভাবে সিস্টেম ডাটাবেজ থেকে বাতিল করা হয়েছে।`;
                } else {
                    responseBox.innerText = `[AI ভুল]: ORD${numericalDigits[0]} আইডির কোনো অর্ডার ডাটাবেজে খুঁজে পাওয়া যায়নি।`;
                }
            } 
            else {
                responseBox.innerText = "[AI কম্যান্ড বুঝা যায়নি]: অনুগ্রহ করে এভাবে লিখুন: 'add watch 1200' অথবা 'cancel order 1001'।";
            }
            
            inputField.value = '';
        }

        // --- ৯. সাইট লোড হওয়ার সাথে সাথে ইনিশিয়েট করা ---
        document.addEventListener("DOMContentLoaded", () => {
            renderCatalog();
            renderNavigationUI();
            if(db.currentSession && db.currentSession.role === 'admin') refreshAdminConsole();
            if(db.currentSession && db.currentSession.role === 'vendor') loadCustomerDashboard();
        });
    </script>
</body>
</html>
